<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Diseños — Arisleidy</title>
  <meta name="description" content="Galería de diseños de Arisleidy Paulino Polanco." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Italiana&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/disenos.css" />
</head>
<body>
  <header class="site-header site-header--hero site-header--light" style="--nav-bg:url('../img/fondo-beiche.jpeg');">
    <div class="site-header__inner">
      <a class="site-logo" href="../index.html">Arisleidy Paulino Polanco</a>
      <button class="menu-toggle" type="button" aria-label="Abrir menú" aria-expanded="false" aria-controls="site-nav">☰</button>
      <nav class="site-nav" id="site-nav" aria-label="Principal">
        <a href="../index.html">About</a>
        <a href="work.html" class="semi-active">Work</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </div>
  </header>

  <section class="designs-hero">
    <img class="hero-bg" src="../img/fondo-beiche.jpg" alt="Fondo Mis Diseños" />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="page-title">Mis Diseños</h1>
      <a href="work.html" class="back-link">← Volver a Work</a>
    </div>
  </section>

  <section class="portfolio-section">
    <div class="portfolio-container">
      <div class="slider-header">
        <button class="nav-button" id="prevSlide" aria-label="Anterior">‹</button>
        <h2 class="project-title" id="designTitle">—</h2>
        <button class="nav-button" id="nextSlide" aria-label="Siguiente">›</button>
      </div>

      <div class="image-wrapper" id="stage">
        <img class="project-image" id="designImage" src="" alt="" />
      </div>

      <div class="image-dots" id="dots"></div>
      <p class="project-description" id="designDesc"></p>
    </div>
  </section>

  <footer class="footer">© <span id="year"></span> Arisleidy Paulino Polanco</footer>

  <template id="designsData">
    <article
      data-nombre="Diseño 1 — Plataforma Educativa"
      data-desc="Plataforma conceptual diseñada para ayudar a estudiantes a organizar tareas, cursos y actividades académicas."

      data-nombre="Diseño 3 — Dashboard Reservas"
      data-desc="Sistema visual para la gestión de reservas de una agencia de viajes con tarjetas dinámicas y panel administrativo."
      data-imagenes="../img/maw/1.jpeg,../img/maw/2.jpeg,../img/maw/3.jpeg,../img/maw/4.jpeg,../img/maw/5.jpeg,../img/maw/6.jpeg,../img/maw/7.jpeg"

  <script src="../js/disenos.js"></script>
